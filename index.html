<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Draft</title>
<link rel="stylesheet" href="css/steam-tokens.css">
<link rel="stylesheet" href="css/mtg-draft.css">
</head>
<body>

<!-- TOP NAV -->
<nav id="topnav">
  <span class="nav-logo">✦ MTG Draft</span>
  <button class="nav-btn active"  onclick="goTo('setup')">Setup</button>
  <button class="nav-btn" id="nav-draft" onclick="goTo('draft')" disabled>Draft</button>
  <button class="nav-btn" id="nav-deck"  onclick="goTo('deck')"  disabled>My Deck</button>
  <button class="nav-btn" onclick="goTo('packs')">Pack Tool</button>
</nav>

<!-- SETUP PAGE -->
<div class="page active" id="page-setup">
  <div class="setup-card">
    <div class="setup-title">The Draft Table</div>
    <div class="setup-sub">Open packs, forge your deck, claim glory.</div>
    <div class="field">
      <label>Set Code</label>
      <input type="text" id="s-set" placeholder="e.g. dsk, blb, sos, mh3" maxlength="10" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Players (including you)</label>
      <select id="s-players">
        <option value="2">2 players</option>
        <option value="4">4 players</option>
        <option value="6">6 players</option>
        <option value="8" selected>8 players (standard)</option>
      </select>
    </div>
    <div class="field">
      <label>Packs per Player</label>
      <select id="s-packs">
        <option value="1">1 pack</option>
        <option value="2">2 packs</option>
        <option value="3" selected>3 packs (standard)</option>
        <option value="4">4 packs</option>
      </select>
    </div>
    <button class="start-btn" id="s-btn" onclick="startDraft()">Fetch Set &amp; Begin Draft</button>
    <div class="status-msg" id="s-status">Enter a set code to begin.</div>
    <div class="progress-bar"><div class="progress-fill" id="s-prog"></div></div>
  </div>
</div>

<!-- DRAFT PAGE -->
<div class="page" id="page-draft">
  <div class="draft-bar">
    <div>
      <div class="draft-round" id="d-round">Round 1</div>
      <div class="draft-pick"  id="d-pick">Pick 1</div>
    </div>
    <div class="draft-count" id="d-count">0 cards</div>
  </div>
  <div class="draft-body">
    <div class="pack-area">
      <div class="pack-area-title" id="d-pack-title">Your Pack</div>
      <div class="pack-grid" id="d-grid"></div>
    </div>
    <div class="picks-sidebar">
      <h3>My Picks</h3>
      <ul class="picks-list" id="d-picks"></ul>
    </div>
  </div>
</div>

<!-- DECK PAGE -->
<div class="page" id="page-deck">
  <div class="deck-header">
    <div class="deck-title">My Deck</div>
    <div class="badge" id="dk-count">0 cards</div>
    <button class="exp-btn exp-btn-first" onclick="exportDeck()">Export List</button>
    <button class="exp-btn" onclick="exportArena()">Arena Format</button>
  </div>
  <div class="deck-imgs" id="dk-imgs"></div>
  <div class="by-type-section" id="dk-types"></div>
</div>

<!-- PACK TOOL PAGE -->
<div class="page" id="page-packs">
  <h2>Pack Generator</h2>
  <div class="row">
    <input type="text" id="pt-set" placeholder="Set code (e.g. sos, dsk)" maxlength="10" autocomplete="off" spellcheck="false">
    <button class="small-btn" onclick="ptFetch()">Fetch Set</button>
  </div>
  <div class="pt-status" id="pt-status">Enter a set code to load the card pool.</div>
  <div class="pt-stats"  id="pt-stats"></div>
  <hr class="pt-hr">
  <div id="pt-pack-area">
    <div class="pt-pack-header">
      <h3 id="pt-title"></h3>
      <div class="pt-actions">
        <button class="small-btn" onclick="ptNewPack()">New Pack</button>
        <button class="small-btn" onclick="ptCopy()">Copy</button>
      </div>
    </div>
    <ul class="pt-list" id="pt-list"></ul>
    <div id="pt-imgs"></div>
  </div>
</div>

<!-- Hover preview -->
<div id="card-preview"><img id="preview-img" src="" alt=""></div>
<div id="toast"></div>

<script src="js/mtg-draft.js" defer></script>
</body>
</html>
