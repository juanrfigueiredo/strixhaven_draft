<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Draft Pack Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    font-size: 15px;
    background: #121212;
    color: #e0e0e0;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: #fff;
  }

  .row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  input[type="text"] {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border: 1px solid #444;
    border-radius: 4px;
    background: #1e1e1e;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: #888;
  }

  button {
    padding: 0.5rem 1rem;
    border: 1px solid #555;
    border-radius: 4px;
    background: #2a2a2a;
    color: #e0e0e0;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }

  button:hover { background: #333; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  #status {
    font-size: 13px;
    color: #888;
    margin-bottom: 0.5rem;
    min-height: 1.2em;
  }

  #stats {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 1.5rem;
  }

  hr {
    border: none;
    border-top: 1px solid #333;
    margin: 1.5rem 0;
  }

  #pack-area { display: none; }

  .pack-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .pack-header h2 {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
  }

  .pack-actions {
    display: flex;
    gap: 0.5rem;
  }

  ul#card-list {
    list-style: none;
  }

  li.card-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid #222;
  }

  .rarity-pip {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pip-mythic   { background: #e8803a; }
  .pip-rare     { background: #c9a84c; }
  .pip-uncommon { background: #7aaec9; }
  .pip-common   { background: #888; }
  .pip-land     { background: #7dc97a; }
  .pip-special  { background: #c97adc; }

  .card-name { flex: 1; }

  .card-cost {
    font-size: 13px;
    color: #888;
    font-family: monospace;
  }

  .card-type {
    font-size: 13px;
    color: #777;
    min-width: 100px;
    text-align: right;
    font-style: italic;
  }

  li.sep {
    border: none;
    border-top: 1px solid #2a2a2a;
    margin: 4px 0;
    padding: 0;
  }

  #placeholder {
    color: #555;
    font-size: 14px;
  }

  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: #333;
    color: #e0e0e0;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 0.5rem 1rem;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>MTG Draft Pack Generator</h1>

  <div class="row">
    <input type="text" id="set-input" placeholder="Set code (e.g. sos, dsk)" maxlength="10" autocomplete="off" spellcheck="false">
    <button id="fetch-btn" onclick="fetchSet()">Fetch Set</button>
  </div>

  <div id="status">Enter a set code to load the card pool.</div>
  <div id="stats"></div>

  <hr>

  <div id="pack-area">
    <div class="pack-header">
      <h2 id="pack-title"></h2>
      <div class="pack-actions">
        <button onclick="generatePack()">New Pack</button>
        <button onclick="copyPack()">Copy</button>
      </div>
    </div>
    <ul id="card-list"></ul>
  </div>

  <div id="placeholder">Fetch a set to generate a pack.</div>
</div>

<div id="toast"></div>

<script>
let cardPool = { mythic:[], rare:[], uncommon:[], common:[], land:[], special:[] };
let setCode = '';

const PROXY = 'https://corsproxy.io/?url=';

const rarityMap = {
  'm': 'mythic', 'mythic rare': 'mythic', 'mythic': 'mythic',
  'r': 'rare', 'rare': 'rare',
  'u': 'uncommon', 'uncommon': 'uncommon',
  'c': 'common', 'common': 'common',
  'l': 'land', 'b': 'land', 'basic land': 'land', 'land': 'land',
  's': 'special', 'special': 'special', 'bonus': 'special', 'timeshifted': 'special'
};

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function fetchSet() {
  const code = document.getElementById('set-input').value.trim().toLowerCase();
  if (!code) { setStatus('Please enter a set code.'); return; }

  setStatus('Fetching...');
  document.getElementById('fetch-btn').disabled = true;
  document.getElementById('stats').textContent = '';
  document.getElementById('pack-area').style.display = 'none';
  document.getElementById('placeholder').style.display = 'block';

  const url = 'https://mtg.wtf/card?q=set%3A' + encodeURIComponent(code);

  try {
    const resp = await fetch(PROXY + encodeURIComponent(url), {
      headers: { 'Cookie': 'default_view=checklist' }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    parseCards(html, code);
  } catch (e) {
    setStatus('Error: ' + e.message);
    document.getElementById('fetch-btn').disabled = false;
  }
}

function parseCards(html, code) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  let cards = parseChecklist(doc);
  if (cards.length === 0) cards = parseCardView(doc);

  if (cards.length === 0) {
    setStatus('No cards found for "' + code.toUpperCase() + '". Check the set code.');
    document.getElementById('fetch-btn').disabled = false;
    return;
  }

  setCode = code.toUpperCase();
  cardPool = { mythic:[], rare:[], uncommon:[], common:[], land:[], special:[] };

  cards.forEach(c => {
    const bucket = rarityMap[c.rarity.toLowerCase()] || 'common';
    cardPool[bucket].push(c);
  });

  localStorage.setItem('mtg_cardpool', JSON.stringify(cardPool));
  localStorage.setItem('mtg_setcode', setCode);

  setStatus(cards.length + ' cards loaded for ' + setCode + '.');
  showStats();
  generatePack();
  document.getElementById('fetch-btn').disabled = false;
}

function parseChecklist(doc) {
  const cards = [];
  const tables = doc.querySelectorAll('table');

  for (const table of tables) {
    const headers = [...table.querySelectorAll('th')].map(th => th.textContent.trim().toLowerCase());
    if (headers.length === 0) continue;

    console.log('Table headers:', headers);

    const colIdx = {};
    headers.forEach((h, i) => {
      if (h === '#' || h === 'number' || h.includes('number')) colIdx.number = i;
      if (h === 'name' || h.includes('name')) colIdx.name = i;
      if (h === 'cost' || h.includes('cost') || h.includes('mana')) colIdx.cost = i;
      if (h === 'type' || h.includes('type')) colIdx.type = i;
      if (h === 'r' || h === 'rarity' || h.includes('rarity')) colIdx.rarity = i;
      if (h === 'artist' || h.includes('artist')) colIdx.artist = i;
    });

    console.log('colIdx:', colIdx);

    if (colIdx.name === undefined) continue;

    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(row => {
      const cells = [...row.querySelectorAll('td')];
      if (cells.length < 2) return;
      const get = (key) => colIdx[key] !== undefined && cells[colIdx[key]] ? cells[colIdx[key]].textContent.trim() : '';
      const name = get('name');
      const rarity = get('rarity') || 'c';
      if (!name) return;
      cards.push({ number: get('number'), name, cost: get('cost'), type: get('type'), rarity, artist: get('artist') });
    });

    if (cards.length > 0) break;
  }
  return cards;
}

function parseCardView(doc) {
  const cards = [];
  const entries = doc.querySelectorAll('h3 a');
  entries.forEach(a => {
    const parent = a.closest('div, li, section') || a.parentElement?.parentElement;
    const name = a.textContent.trim();
    if (!name || name.length < 2) return;
    const text = parent ? parent.textContent : '';
    let rarity = 'c';
    if (/mythic rare/i.test(text)) rarity = 'm';
    else if (/\brare\b/i.test(text)) rarity = 'r';
    else if (/uncommon/i.test(text)) rarity = 'u';
    else if (/basic land/i.test(text)) rarity = 'l';
    cards.push({ number: '', name, cost: '', type: '', rarity, artist: '' });
  });
  return cards;
}

function showStats() {
  const parts = [];
  if (cardPool.mythic.length)   parts.push(cardPool.mythic.length + ' M');
  if (cardPool.rare.length)     parts.push(cardPool.rare.length + ' R');
  if (cardPool.uncommon.length) parts.push(cardPool.uncommon.length + ' U');
  if (cardPool.common.length)   parts.push(cardPool.common.length + ' C');
  if (cardPool.land.length)     parts.push(cardPool.land.length + ' L');
  if (cardPool.special.length)  parts.push(cardPool.special.length + ' S');
  document.getElementById('stats').textContent = parts.join(' · ');
}

function pick(arr, n) {
  const pool = [...arr];
  const result = [];
  for (let i = 0; i < n && pool.length; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(idx, 1)[0]);
  }
  return result;
}

function generatePack() {
  const total = Object.values(cardPool).flat().length;
  if (total === 0) return;

  const pack = [];

  const useMythic = cardPool.mythic.length > 0 && Math.random() < (1/8);
  if (useMythic) {
    pack.push(...pick(cardPool.mythic, 1));
  } else if (cardPool.rare.length > 0) {
    pack.push(...pick(cardPool.rare, 1));
  } else if (cardPool.mythic.length > 0) {
    pack.push(...pick(cardPool.mythic, 1));
  }

  pack.push(...pick(cardPool.uncommon, Math.min(3, cardPool.uncommon.length)));

  const slotsLeft = Math.max(0, 14 - pack.length);
  let commonPool = [...cardPool.common];
  if (cardPool.land.length > 0) commonPool = [...commonPool, ...cardPool.land.slice(0, 5)];
  pack.push(...pick(commonPool, Math.min(slotsLeft, commonPool.length)));

  if (pack.length < 5) {
    const all = Object.values(cardPool).flat();
    const names = new Set(pack.map(c => c.name));
    const extras = all.filter(c => !names.has(c.name));
    pack.push(...pick(extras, Math.min(14 - pack.length, extras.length)));
  }

  renderPack(pack);
}

const rarityOrder = { mythic:0, special:1, rare:2, uncommon:3, land:4, common:5 };

function renderPack(pack) {
  const sorted = [...pack].sort((a, b) => {
    const ra = rarityMap[a.rarity.toLowerCase()] || 'common';
    const rb = rarityMap[b.rarity.toLowerCase()] || 'common';
    return (rarityOrder[ra] ?? 5) - (rarityOrder[rb] ?? 5);
  });

  const list = document.getElementById('card-list');
  list.innerHTML = '';

  let lastRarity = null;
  sorted.forEach(card => {
    const r = rarityMap[card.rarity.toLowerCase()] || 'common';
    if (lastRarity && lastRarity !== r) {
      const sep = document.createElement('li');
      sep.className = 'sep';
      list.appendChild(sep);
    }
    lastRarity = r;

    const li = document.createElement('li');
    li.className = 'card-item';
    li.innerHTML =
      '<div class="rarity-pip pip-' + r + '"></div>' +
      '<span class="card-name">' + escHtml(card.name) + '</span>' +
      '<span class="card-cost">' + escHtml(card.cost) + '</span>' +
      '<span class="card-type">' + escHtml(shortType(card.type)) + '</span>';
    list.appendChild(li);
  });

  document.getElementById('pack-title').textContent = setCode + ' Booster Pack (' + pack.length + ' cards)';
  document.getElementById('pack-area').style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
}

function shortType(type) {
  if (!type) return '';
  return type.split('//')[0].trim().substring(0, 30);
}

function escHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function copyPack() {
  const items = document.querySelectorAll('#card-list .card-item');
  if (!items.length) return;
  const lines = [];
  items.forEach(li => {
    const name = li.querySelector('.card-name')?.textContent.trim();
    if (name) lines.push(name);
  });
  try {
    await navigator.clipboard.writeText(lines.join('\n'));
    showToast('Copied!');
  } catch {
    prompt('Copy this pack:', lines.join('\n'));
  }
}

document.getElementById('set-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchSet();
});

(function() {
  const savedPool = localStorage.getItem('mtg_cardpool');
  const savedCode = localStorage.getItem('mtg_setcode');
  if (savedPool && savedCode) {
    try {
      cardPool = JSON.parse(savedPool);
      setCode = savedCode;
      document.getElementById('set-input').value = savedCode.toLowerCase();
      const total = Object.values(cardPool).flat().length;
      setStatus(total + ' cards loaded for ' + setCode + ' (cached).');
      showStats();
      generatePack();
    } catch(e) {
      localStorage.removeItem('mtg_cardpool');
      localStorage.removeItem('mtg_setcode');
    }
  }
})();
</script>
</body>
</html>
