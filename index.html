// ======= PARSE CSV =======
function parseCSV(data) {
  const lines = data.trim().split("\n");
  const headers = lines[0].split(",");

  return lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => {
      let value = values[i]?.trim();

      // 🔧 REMOVE surrounding quotes
      if (value?.startsWith('"') && value?.endsWith('"')) {
        value = value.slice(1, -1);
      }

      obj[h.trim()] = value;
    });
    return obj;
  });
}

const cards = parseCSV(csvData);

// ======= CREATE POOLS =======
const commons = cards.filter(c => c.Rarity?.toLowerCase() === "common");
const uncommons = cards.filter(c => c.Rarity?.toLowerCase() === "uncommon");
const rares = cards.filter(c => c.Rarity?.toLowerCase() === "rare");
const mythics = cards.filter(c => c.Rarity?.toLowerCase().includes("mythic"));
const lands = cards.filter(c => c.Type?.includes("Land"));

// ======= RANDOM PICK =======
function pickRandom(array, n = 1) {
  let shuffled = [...array].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, n);
}

function pickRare() {
  return Math.random() < 1/8
    ? pickRandom(mythics, 1)
    : pickRandom(rares, 1);
}

function pickAny() {
  return pickRandom(cards, 1);
}

// ======= GENERATE PACK =======
function generatePack() {
  let pack = [
    ...pickRandom(commons, 7),
    ...pickRandom(uncommons, 3),
    ...pickRare(),
    ...pickRandom(lands, 1),
    ...pickAny(), // wildcard
    ...pickAny()  // foil
  ];

  // Shuffle pack
  pack.sort(() => 0.5 - Math.random());

  // Output: one card per line
  const text = pack.map(c => c.name).join("\n");
  document.getElementById("output").value = text;
}

// ======= COPY =======
function copyToClipboard() {
  const textarea = document.getElementById("output");
  textarea.select();
  document.execCommand("copy");
}
